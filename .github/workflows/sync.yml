name: Sync main → blogs

# Mirror everything pushed to `main` over to the `blogs` branch.
# Lovable pushes to main; this keeps `blogs` in sync automatically
# so Cloudflare Pages (or any consumer of the blogs branch) stays current.

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: sync-blogs
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Force-push main to blogs
        run: |
          git push origin "refs/heads/main:refs/heads/blogs" --force